services:
  web:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rbyc-web
    env_file:
      - ../backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-backend.aws_production}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RUN_MIGRATIONS: "1"
      COLLECT_STATIC: "1"
      CREATE_SUPERUSER: "1"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rbyc-worker
    env_file:
      - ../backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-backend.aws_production}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RUN_MIGRATIONS: "0"
      COLLECT_STATIC: "0"
      CREATE_SUPERUSER: "0"
    command: ["celery", "-A", "backend", "worker", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rbyc-beat
    env_file:
      - ../backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-backend.aws_production}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RUN_MIGRATIONS: "0"
      COLLECT_STATIC: "0"
      CREATE_SUPERUSER: "0"
    command: ["celery", "-A", "backend", "beat", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rbyc-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
